<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ALPSTUGA cards — demo</title>
    <!-- Roboto (HA's UI font) from a CDN — no vendored font files. -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        font-family: "Roboto", "Noto", "Helvetica Neue", Arial, sans-serif;
      }
      body {
        margin: 0;
        padding: 24px;
      }
      h1 {
        font-size: 1.1rem;
        font-weight: 600;
        margin: 0 0 16px;
        color: #222;
      }
      .stage {
        display: flex;
        gap: 20px;
        align-items: flex-start;
      }
      .col {
        flex: 0 0 380px;
        border-radius: 16px;
        padding: 16px;
      }
      .col h2 {
        font-size: 0.85rem;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.06em;
        margin: 0 0 12px;
        opacity: 0.75;
      }
      .card-slot {
        margin-bottom: 16px;
      }
      .card-slot:last-child {
        margin-bottom: 0;
      }

      /* --- Home Assistant default theme variables ------------------------- */
      /* Values taken from the HA frontend build's default light/dark themes.  */
      .theme-light {
        --primary-text-color: #212121;
        --secondary-text-color: #727272;
        --disabled-text-color: #bdbdbd;
        --divider-color: rgba(0, 0, 0, 0.12);
        --card-background-color: #ffffff;
        --ha-card-background: #ffffff;
        --primary-background-color: #fafafa;
        --secondary-background-color: #e5e5e5;
        --primary-color: #03a9f4;
        --state-icon-color: #44739e;
        --paper-item-icon-color: #44739e;
        background: var(--primary-background-color);
        color: var(--primary-text-color);
      }
      .theme-dark {
        --primary-text-color: #e1e1e1;
        --secondary-text-color: #9b9b9b;
        --disabled-text-color: #6f6f6f;
        --divider-color: rgba(225, 225, 225, 0.12);
        --card-background-color: #1c1c1c;
        --ha-card-background: #1c1c1c;
        --primary-background-color: #111111;
        --secondary-background-color: #282828;
        --primary-color: #03a9f4;
        --state-icon-color: #44739e;
        --paper-item-icon-color: #44739e;
        background: var(--primary-background-color);
        color: var(--primary-text-color);
      }
    </style>
  </head>
  <body>
    <div class="stage">
      <section class="col theme-light">
        <h2>Light</h2>
        <div class="card-slot" data-card="alpstuga-card"></div>
        <div class="card-slot" data-card="alpstuga-card-advanced"></div>
      </section>
      <section class="col theme-dark">
        <h2>Dark</h2>
        <div class="card-slot" data-card="alpstuga-card"></div>
        <div class="card-slot" data-card="alpstuga-card-advanced"></div>
      </section>
    </div>

    <script type="module">
      // Shared HA stubs + mock-data helpers (see demo/harness.js).
      import { HOURS, makeSeries, wig, buildHass } from "./harness.js";

      // The real cards.
      await import("../alpstuga-card.js");
      await import("../alpstuga-card-advanced.js");

      /* -----------------------------------------------------------------
       * A calm, healthy "Living Room" — the header showcase. Guideline
       * coloring is on by default, so a good room reads mostly green.
       * --------------------------------------------------------------- */
      const co2Series = makeSeries((f, i) => {
        // daily arc 480 → 1150 → 620 with wiggle
        const base = 480 + Math.sin(f * Math.PI) * 640 + Math.sin(f * 8) * 90;
        return Math.max(420, Math.round(base + wig(i, 60)));
      });
      const pm25Series = makeSeries((f, i) => {
        const base = 5 + Math.sin(f * 6) * 4 + (f > 0.55 && f < 0.7 ? 22 : 0); // a cooking spike
        return Math.max(1, +(base + wig(i, 2)).toFixed(1));
      });
      const tempSeries = makeSeries((f, i) => {
        const base = 20.5 + Math.sin(f * Math.PI - 0.6) * 2.4;
        return +(base + wig(i, 0.4)).toFixed(1);
      });
      const humSeries = makeSeries((f, i) => {
        const base = 46 - Math.sin(f * Math.PI - 0.6) * 8;
        return Math.round(base + wig(i, 2));
      });
      const startMs = Date.now() - HOURS * 3600 * 1000;
      const aqiRaw = [
        { s: "good", lu: startMs / 1000 },
        { s: "fair", lu: (startMs + 6 * 3600e3) / 1000 },
        { s: "good", lu: (startMs + 10 * 3600e3) / 1000 },
        { s: "poor", lu: (startMs + 13.2 * 3600e3) / 1000 },
        { s: "moderate", lu: (startMs + 14 * 3600e3) / 1000 },
        { s: "good", lu: (startMs + 16 * 3600e3) / 1000 },
      ];

      const hass = buildHass({
        deviceName: "Living Room",
        metrics: {
          air_quality: { dc: "enum", unit: undefined, data: aqiRaw },
          co2: { dc: "carbon_dioxide", unit: "ppm", data: co2Series },
          pm25: { dc: "pm25", unit: "µg/m³", data: pm25Series },
          temperature: { dc: "temperature", unit: "°C", data: tempSeries },
          humidity: { dc: "humidity", unit: "%", data: humSeries },
        },
      });

      for (const slot of document.querySelectorAll(".card-slot")) {
        const el = document.createElement(slot.dataset.card);
        el.setConfig({ device: "alpstuga1", hours: HOURS });
        el.hass = hass;
        slot.appendChild(el);
      }
    </script>
  </body>
</html>
